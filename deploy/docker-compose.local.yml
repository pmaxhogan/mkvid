services:
  mkvid:
    build: ..
    container_name: mkvid-local
    ports:
      - "8080:8080"
    env_file: [../.env]
    environment:
      DATA_DIR: /data
    volumes:
      - ./_localdata:/data
    # GPU (Docker Desktop + WSL2 + NVIDIA Container Toolkit). Comment out to force libx264.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
