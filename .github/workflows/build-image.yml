name: build-image
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'deploy/entrypoint.sh'
      - 'Dockerfile'
      - 'package*.json'
      - '.github/workflows/build-image.yml'
  schedule:
    - cron: '0 7 * * 1'  # weekly: refresh jellyfin-ffmpeg + bundled yt-dlp
  workflow_dispatch:
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mkvid
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/mkvid:sha-$(git rev-parse --short HEAD)"
          docker run --rm "$IMAGE" node -e "require('fs').accessSync('dist/index.js'); console.log('dist ok')"
          docker run --rm "$IMAGE" sh -c "/usr/local/bin/ffmpeg -encoders | grep -q nvenc && yt-dlp --version"
